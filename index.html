<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily - Quem vai hoje?</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #fafafa;
            --card-bg: #ffffff;
            --accent: #10b981;
            --accent-hover: #059669;
            --text: #1f2937;
            --text-light: #6b7280;
            --border: #e5e7eb;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
            padding: 24px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* API Key */
        .apikey-input {
            position: fixed;
            top: 16px;
            right: 16px;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            background: var(--card-bg);
            color: var(--text);
            width: 160px;
            transition: border-color 0.2s;
        }

        .apikey-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Hero Section */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px 0;
        }

        .hero-label {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 16px;
            font-weight: 500;
        }

        .hero-name {
            font-size: 72px;
            font-weight: 700;
            color: var(--accent);
            line-height: 1.1;
            word-break: break-word;
        }

        .hero-name.empty {
            font-size: 18px;
            color: var(--text-light);
            font-weight: 500;
        }

        /* List Section */
        .section {
            flex-shrink: 0;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .person-list {
            list-style: none;
        }

        .person-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--card-bg);
            border-radius: 12px;
            margin-bottom: 8px;
            transition: background 0.15s;
        }

        .person-item:hover {
            background: #f9fafb;
        }

        .person-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            appearance: none;
            flex-shrink: 0;
            transition: all 0.15s;
        }

        .person-checkbox:checked {
            background: var(--accent);
            border-color: var(--accent);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3E%3C/svg%3E");
        }

        .person-checkbox:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }

        .person-name {
            flex: 1;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }

        .person-date {
            font-size: 12px;
            color: var(--text-light);
        }

        .person-delete {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            color: var(--text-light);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.15s;
            opacity: 0;
        }

        .person-item:hover .person-delete {
            opacity: 1;
        }

        .person-delete:hover {
            background: #fef2f2;
            color: var(--danger);
        }

        /* Bottom Section */
        .bottom-section {
            flex-shrink: 0;
        }

        /* Form */
        .add-form {
            display: flex;
            gap: 8px;
            padding-top: 16px;
        }

        .add-input {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            background: var(--card-bg);
            transition: border-color 0.2s;
        }

        .add-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .add-input::placeholder {
            color: var(--text-light);
        }

        .add-btn {
            padding: 14px 24px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
        }

        .add-btn:hover {
            background: var(--accent-hover);
        }

        .add-btn:active {
            transform: scale(0.98);
        }

        /* Edit input */
        .edit-input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid var(--accent);
            border-radius: 6px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
        }

        @media (max-width: 480px) {
            .app {
                padding: 16px;
            }

            .hero {
                padding: 32px 0 28px;
            }

            .hero-name {
                font-size: 48px;
            }

            .apikey-input {
                width: 120px;
                font-size: 12px;
                padding: 6px 10px;
            }

            .add-form {
                flex-direction: column;
            }

            .add-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <input
        id="apikey-input"
        class="apikey-input"
        type="password"
        placeholder="API Key"
    />

    <div class="app">
        <header class="hero">
            <p class="hero-label">Quem vai fazer a daily hoje é</p>
            <h1 id="highlight-person" class="hero-name"></h1>
        </header>

        <div class="bottom-section">
            <section class="section">
                <h2 class="section-title">Pessoas</h2>
                <ul id="person-list" class="person-list"></ul>
            </section>

            <form id="person-form" class="add-form">
                <input type="text" id="person-input" class="add-input" placeholder="Nome da pessoa" required>
                <button type="submit" class="add-btn">Adicionar</button>
            </form>
        </div>
    </div>

    <script>
        // Substitua pelo seu endpoint do jsonbin.io
        const JSONBIN_URL = 'https://api.jsonbin.io/v3/b/68b9a77bae596e708fe26286';
        let JSONBIN_TOKEN = '';
        const apikeyInput = document.getElementById('apikey-input');

        // Função para pegar parâmetro da URL (aceita apikey ou api-key)
        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // Prioridade: 1) URL param (api-key ou apikey), 2) localStorage
        const urlApiKey = getUrlParam('api-key') || getUrlParam('apikey');
        if (urlApiKey) {
            JSONBIN_TOKEN = urlApiKey;
            apikeyInput.value = JSONBIN_TOKEN;
            apikeyInput.style.display = 'none';
        } else if (localStorage.getItem('jsonbin_apikey')) {
            JSONBIN_TOKEN = localStorage.getItem('jsonbin_apikey');
            apikeyInput.value = JSONBIN_TOKEN;
        }

        // Atualiza a API Key ao digitar (só funciona se input estiver visível)
        apikeyInput.addEventListener('change', function () {
            JSONBIN_TOKEN = apikeyInput.value.trim();
            if (JSONBIN_TOKEN) {
                localStorage.setItem('jsonbin_apikey', JSONBIN_TOKEN);
                fetchPeople();
            }
        });

        // Seleciona elementos
        const form = document.getElementById('person-form');
        const input = document.getElementById('person-input');
        const list = document.getElementById('person-list');
        const highlight = document.getElementById('highlight-person');

        // Estado local
        let people = [];

        // Função para buscar dados do JSONBin
        async function fetchPeople() {
            if (!JSONBIN_TOKEN) {
                people = [];
                renderList();
                return;
            }
            try {
                const res = await fetch(JSONBIN_URL + '/latest', {
                    headers: {
                        'X-Master-Key': JSONBIN_TOKEN
                    }
                });
                if (!res.ok) throw new Error('Erro ao buscar dados');
                const data = await res.json();
                people = data.record.people || [];
                renderList();
            } catch (err) {
                people = [];
                renderList();
            }
        }

        // Função para salvar dados no JSONBin
        async function savePeople() {
            if (!JSONBIN_TOKEN) return;
            await fetch(JSONBIN_URL, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': JSONBIN_TOKEN
                },
                body: JSON.stringify({ people })
            });
        }

        // Renderiza a lista na tela
        function renderList() {
            list.innerHTML = '';
            people.forEach((person, idx) => {
                const li = document.createElement('li');
                li.className = 'person-item';

                // Checkbox
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'person-checkbox';
                checkbox.checked = !!person.checked;

                // Evento para mostrar/remover data e atualizar JSONBin
                checkbox.addEventListener('change', function () {
                    if (checkbox.checked) {
                        person.checked = true;
                        person.date = new Date().toLocaleString('pt-BR');
                    } else {
                        person.checked = false;
                        delete person.date;
                    }
                    savePeople();
                    renderList();
                    updateHighlight();
                });

                li.appendChild(checkbox);

                // Nome editável
                const nameSpan = document.createElement('span');
                nameSpan.textContent = person.name;
                nameSpan.className = 'person-name';
                nameSpan.addEventListener('click', function () {
                    if (person.checked) return;
                    const inputEdit = document.createElement('input');
                    inputEdit.type = 'text';
                    inputEdit.value = person.name;
                    inputEdit.className = 'edit-input';
                    nameSpan.replaceWith(inputEdit);
                    inputEdit.focus();

                    inputEdit.addEventListener('blur', saveEdit);
                    inputEdit.addEventListener('keydown', function (e) {
                        if (e.key === 'Enter') {
                            saveEdit();
                        }
                    });

                    function saveEdit() {
                        const newName = inputEdit.value.trim();
                        if (newName) {
                            person.name = newName;
                            savePeople().then(renderList);
                        } else {
                            renderList();
                        }
                    }
                });
                li.appendChild(nameSpan);

                // Data da marcação
                if (person.checked && person.date) {
                    const dateSpan = document.createElement('span');
                    dateSpan.className = 'person-date';
                    dateSpan.textContent = person.date;
                    li.appendChild(dateSpan);
                }

                // Botão de excluir (apenas se não estiver marcado)
                if (!person.checked) {
                    const deleteBtn = document.createElement('button');
                    deleteBtn.type = 'button';
                    deleteBtn.className = 'person-delete';
                    deleteBtn.innerHTML = '×';
                    deleteBtn.title = 'Excluir pessoa';
                    deleteBtn.addEventListener('click', function (e) {
                        e.stopPropagation();
                        people.splice(idx, 1);
                        savePeople().then(renderList);
                    });
                    li.appendChild(deleteBtn);
                }

                list.appendChild(li);
            });
            updateHighlight();
        }

        // Atualiza o destaque central
        function updateHighlight() {
            highlight.classList.remove('empty');
            let found = false;
            for (let i = 0; i < people.length; i++) {
                if (!people[i].checked) {
                    highlight.textContent = people[i].name;
                    found = true;
                    break;
                }
            }
            // Se todos estão marcados, desmarque todos e mostre o primeiro novamente
            if (!found && people.length > 0) {
                people.forEach(p => {
                    p.checked = false;
                    delete p.date;
                });
                savePeople().then(() => {
                    renderList();
                });
                highlight.textContent = people[0].name;
            } else if (people.length === 0) {
                highlight.classList.add('empty');
                highlight.textContent = 'Nenhuma pessoa cadastrada';
            }
        }

        // Adiciona pessoa na lista
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = input.value.trim();
            if (name) {
                people.push({ name, checked: false });
                await savePeople();
                renderList();
                input.value = '';
            }
        });

        // Inicializa
        fetchPeople();
    </script>
</body>
</html>
